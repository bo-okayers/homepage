<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        /* Reset margins and padding so there are no accidental white borders */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            background-color: #000000; /* Change this if you want a different background color under/behind the image */
        }

        .landing-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .landing-image {
            width: 100%;       /* Forces the image to match the exact width of the screen */
            height: auto;      /* Keeps the original aspect ratio so the image doesn't stretch or distort */
            display: block;    /* Removes the default extra bottom gap that browsers add to images */
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <!-- Your image is placed directly here -->
        <img src="Homepage.png" alt="Homepage Landing" class="landing-image">
    </div>

</body>
</html>
