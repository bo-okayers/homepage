<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Removes scrollbars */
        }
        .landing-image {
            /* Replace 'your-image.png' with your actual filename */
            background-image: url("Homepage.png");
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover; /* Crops to fill screen */
            /* Use 'background-size: contain;' if you don't want any cropping */
        }
    </style>
</head>
<body>
    <div class="landing-image"></div>
</body>
</html>
